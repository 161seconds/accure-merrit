<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GieoNhanLanh - Register</title>
    <link rel="icon" type="image/png" href="../../assets/images/logoApp/logoHertz.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="./register.css" />

    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: #7a5e28;
            --red: #b83228;
            --red-glow: rgba(184, 50, 40, 0.4);
            --jade: #2e6b48;
            --jade-light: #4a9b6a;
            --ink: #0d0a04;
            --ink2: #1a1108;
            --parchment: #f0e6c8;
            --parchment2: #d8c89a;
            --smoke: rgba(240, 230, 200, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            font-size: 62.5%;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1108, #0d0a04);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.6rem;
        }

        .containerLogin {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .boxLogin {
            width: 450px;
            /* Tăng nhẹ chiều rộng cho trang đăng ký */
            background: var(--smoke);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
        }

        .titleLogin {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--gold-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .inputBoxLogin {
            position: relative;
            width: 100%;
            margin-bottom: 24px;
        }

        .inputBoxLogin input {
            width: 100%;
            padding: 14px 10px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            border-bottom: 1px solid #333;
        }

        .inputBoxLogin span {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            font-size: 14px;
            pointer-events: none;
            transition: 0.3s;
        }

        .inputBoxLogin i {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--gold-dim);
            transition: 0.3s;
        }

        .inputBoxLogin input:focus~span,
        .inputBoxLogin input:valid~span {
            top: -6px;
            font-size: 12px;
            color: var(--gold-dim);
        }

        .inputBoxLogin input:focus~i,
        .inputBoxLogin input:valid~i {
            width: 100%;
        }

        .btnLogin {
            width: 100%;
            padding: 11px;
            background: var(--gold-dim);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 2rem;
        }

        .btnLogin:hover {
            background: var(--gold-light);
        }

        .linksLogin {
            text-align: center;
            margin-top: 20px;
        }

        .linksLogin span {
            font-size: 13px;
            color: #aaa;
        }

        .linksLogin a {
            color: var(--gold-dim);
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
        }

        .linksLogin a:hover {
            color: var(--gold-light);
        }

        .passwordBox {
            position: relative;
        }

        .togglePassword {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #777;
            cursor: pointer;
            font-size: 1.8rem;
        }

        .boxPrivacy {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .boxPrivacy input[type="checkbox"] {
            width: 1.8rem;
            height: 1.8rem;
            accent-color: var(--gold-dim);
            cursor: pointer;
        }

        .privacy-text {
            font-size: 1.2rem;
            color: #aaa;
            line-height: 1.4;
        }

        .privacy-text a {
            color: var(--gold-dim);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .boxLogin {
                width: 95%;
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="containerLogin">
        <div class="boxLogin">
            <div class="titleLogin">Register</div>
            <form id="formRegister" autocomplete="off">
                <div class="inputBoxLogin">
                    <input type="text" id="username" required />
                    <span>Username</span>
                    <i></i>
                </div>

                <div class="inputBoxLogin">
                    <input type="email" id="email" required />
                    <span>Email Address</span>
                    <i></i>
                </div>

                <div class="inputBoxLogin passwordBox">
                    <input type="password" id="password" required />
                    <span>Password</span>
                    <i></i>
                    <button type="button" class="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <div class="inputBoxLogin passwordBox">
                    <input type="password" id="confirmPassword" required />
                    <span>Confirm Password</span>
                    <i></i>
                    <button type="button" class="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <label class="boxPrivacy">
                    <input id="agree" type="checkbox" required />
                    <span class="privacy-text">
                        I agree to the
                        <a href="#">Privacy Policy</a> and <a href="#">Terms of Use</a>.
                    </span>
                </label>

                <button type="submit" class="btnLogin">Create Account</button>

                <div class="linksLogin">
                    <span>Already have an account?</span>
                    <a href="./login.html">Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Logic ẩn hiện mật khẩu (Xử lý cho cả 2 ô password)
        const toggleButtons = document.querySelectorAll(".togglePassword");
        toggleButtons.forEach((btn) => {
            btn.addEventListener("click", function () {
                const input = this.parentElement.querySelector("input");
                const icon = this.querySelector("i");

                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            });
        });

        document.getElementById("formRegister").addEventListener("submit", (e) => {
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirmPassword").value;

            if (password !== confirm) {
                e.preventDefault();
                alert("Passwords do not match!");
            }
        });

        function handleRegister(username, password, name) {
            let users = JSON.parse(localStorage.getItem('users')) || [];

            if (users.find(u => u.username === username)) {
                alert('This username is already taken!');
                return;
            }

            const newUser = { username, password, name: name || username };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            alert('Registration successful! You can now log in.');
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            window.location.href = 'login.html';
        }

    </script>
</body>

</html>
