<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GieoNhanLanh - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: #7a5e28;
            --red: #b83228;
            --jade: #2e6b48;
            --ink: #0d0a04;
            --smoke: rgba(240, 230, 200, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            font-size: 62.5%;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1108, #0d0a04);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.6rem;
            position: relative;
            overflow: hidden;
        }

        /* Hieu ung bui vang / dom dom background */
        .bg-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .containerLogin {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1;
        }

        .boxLogin {
            width: 450px;
            background: rgba(20, 15, 10, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
        }

        .titleLogin {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--gold-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .inputBoxLogin {
            position: relative;
            width: 100%;
            margin-bottom: 24px;
        }

        .inputBoxLogin input {
            width: 100%;
            padding: 14px 10px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            border-bottom: 1px solid #333;
        }

        .inputBoxLogin span {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            font-size: 14px;
            pointer-events: none;
            transition: 0.3s;
        }

        .inputBoxLogin i {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--gold-dim);
            transition: 0.3s;
        }

        .inputBoxLogin input:focus~span,
        .inputBoxLogin input:valid~span {
            top: -6px;
            font-size: 12px;
            color: var(--gold-dim);
        }

        .inputBoxLogin input:focus~i,
        .inputBoxLogin input:valid~i {
            width: 100%;
        }

        .btnLogin {
            width: 100%;
            padding: 11px;
            background: var(--gold-dim);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 2rem;
        }

        .btnLogin:hover {
            background: var(--gold-light);
        }

        .linksLogin {
            text-align: center;
            margin-top: 20px;
        }

        .linksLogin span {
            font-size: 13px;
            color: #aaa;
        }

        .linksLogin a {
            color: var(--gold-dim);
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
        }

        .linksLogin a:hover {
            color: var(--gold-light);
        }

        .passwordBox {
            position: relative;
        }

        .togglePassword {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #777;
            cursor: pointer;
            font-size: 1.8rem;
        }

        .togglePassword:hover,
        .passwordBox input:focus~.togglePassword {
            color: var(--gold-dim);
        }

        .boxPrivacy {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .boxPrivacy input[type="checkbox"] {
            width: 1.8rem;
            height: 1.8rem;
            accent-color: var(--gold-dim);
            cursor: pointer;
        }

        .privacy-text {
            font-size: 1.2rem;
            color: #aaa;
            line-height: 1.4;
        }

        .privacy-text a {
            color: var(--gold-dim);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .boxLogin {
                width: 95%;
                padding: 30px 20px;
            }
        }

        /* ══ CUSTOM DIALOG (THAY THẾ ALERT) ══ */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .dialog-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .dialog-box {
            background: linear-gradient(135deg, #1A1208, #0D0A04);
            border: 1px solid var(--gold);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            transform: scale(0.8);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dialog-overlay.open .dialog-box {
            transform: scale(1);
        }

        .dg-title {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .dg-msg {
            font-size: 13px;
            color: var(--parchment, #F0E6C8);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .dg-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .dg-btn {
            padding: 8px 24px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            min-width: 100px;
            transition: 0.2s;
        }

        .dg-btn.confirm {
            background: var(--gold-dim);
            color: #000;
        }

        .dg-btn.confirm:hover {
            background: var(--gold-light);
        }

        .dg-btn.danger {
            background: var(--red);
            color: #fff;
        }

        .dg-btn.danger:hover {
            background: #E05040;
        }
    </style>
</head>

<body>
    <div class="containerLogin">
        <div class="boxLogin">
            <div class="titleLogin">Đăng Ký</div>
            <form id="formRegister" autocomplete="off">
                <div class="inputBoxLogin">
                    <input type="text" id="username" required />
                    <span>Tên tài khoản</span>
                    <i></i>
                </div>

                <div class="inputBoxLogin">
                    <input type="email" id="email" required />
                    <span>Địa chỉ Email</span>
                    <i></i>
                </div>

                <div class="inputBoxLogin passwordBox">
                    <input type="password" id="password" required />
                    <span>Mật khẩu</span>
                    <i></i>
                    <button type="button" class="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <div class="inputBoxLogin passwordBox">
                    <input type="password" id="confirmPassword" required />
                    <span>Xác nhận mật khẩu</span>
                    <i></i>
                    <button type="button" class="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <label class="boxPrivacy">
                    <input id="agree" type="checkbox" checked required />
                    <span class="privacy-text">
                        Tôi đồng ý với
                        <a href="#">Điều khoản</a> và <a href="#">Chính sách bảo mật</a>.
                    </span>
                </label>

                <button type="submit" class="btnLogin">Tạo Tài Khoản</button>

                <div class="linksLogin">
                    <span>Đã có tài khoản?</span>
                    <a href="./login.html">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>
    <div class="dialog-overlay" id="custom-dialog">
        <div class="dialog-box">
            <div class="dg-title" id="dg-title">Thông báo</div>
            <div class="dg-msg" id="dg-msg">Nội dung</div>
            <div class="dg-btns">
                <button class="dg-btn confirm" id="dg-confirm-btn" onclick="closeDialog()">Đồng ý</button>
            </div>
        </div>
    </div>

    <script>
        // 1. HIỆU ỨNG BỤI VÀNG & ẨN/HIỆN MẬT KHẨU
        function createParticles() {
            const container = document.createElement('div');
            container.className = 'bg-particles';
            document.body.appendChild(container);
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.width = (Math.random() * 5 + 2) + 'px';
                p.style.height = p.style.width;
                p.style.animationDelay = (Math.random() * 8) + 's';
                p.style.animationDuration = (Math.random() * 5 + 6) + 's';
                container.appendChild(p);
            }
        }
        document.addEventListener('DOMContentLoaded', createParticles);

        const toggleButtons = document.querySelectorAll(".togglePassword");
        toggleButtons.forEach((btn) => {
            btn.addEventListener("click", function () {
                const input = this.parentElement.querySelector("input");
                const icon = this.querySelector("i");
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            });
        });

        // 2. HỆ THỐNG POPUP DIALOG (THAY THẾ ALERT)
        let dialogCallback = null;
        function openDialog(title, msg, btnStyle, callback) {
            document.getElementById('dg-title').textContent = title;
            document.getElementById('dg-msg').textContent = msg;

            const confirmBtn = document.getElementById('dg-confirm-btn');
            confirmBtn.className = `dg-btn ${btnStyle}`;

            dialogCallback = callback;
            document.getElementById('custom-dialog').classList.add('open');
        }

        function closeDialog() {
            document.getElementById('custom-dialog').classList.remove('open');
            if (dialogCallback) dialogCallback();
            dialogCallback = null;
        }

        // 3. XỬ LÝ SUBMIT FORM
        document.getElementById("formRegister").addEventListener("submit", (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const confirm = document.getElementById("confirmPassword").value.trim();

            if (password !== confirm) {
                openDialog('Lỗi Đăng Ký', 'Mật khẩu xác nhận không khớp!', 'danger', null);
                return;
            }

            handleRegister(username, email, password, username);
        });

        // 4. GỌI API BACKEND
        async function handleRegister(username, email, password, name) {
            try {
                const response = await fetch('https://accrue-merit.onrender.com/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, email: email, password: password, name: name })
                });

                const data = await response.json();

                if (!response.ok) {
                    openDialog('Lỗi Đăng Ký', data.error || 'Server từ chối dữ liệu (Lỗi 400)', 'danger', null);
                } else {
                    openDialog('Hoàn Tất', 'Đăng ký thành công! Hãy tiến hành đăng nhập.', 'confirm', () => {
                        window.location.href = 'login.html';
                    });
                }
            } catch (err) {
                console.error(err);
                openDialog('Lỗi Mạng', 'Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại.', 'danger', null);
            }
        }
    </script>
</body>

</html>
