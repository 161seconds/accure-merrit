<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GieoNhanLanh - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #7A5E28;
      --red: #B83228;
      --jade: #2E6B48;
      --ink: #0D0A04;
      --smoke: rgba(240, 230, 200, 0.07);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 62.5%;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1A1108, #0D0A04);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 1.6rem;
      position: relative;
      overflow: hidden;
    }

    /* Hieu ung bui vang / dom dom background */
    .bg-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0;
      animation: floatParticle 8s infinite ease-in-out;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    .containerLogin {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    .boxLogin {
      width: 400px;
      background: rgba(20, 15, 10, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201, 168, 76, 0.15);
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
    }

    .titleLogin {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      color: var(--gold-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .inputBoxLogin {
      position: relative;
      width: 100%;
      margin-bottom: 24px;
    }

    .inputBoxLogin input {
      width: 100%;
      padding: 14px 10px;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
      border-bottom: 1px solid #333;
    }

    .inputBoxLogin span {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #777;
      font-size: 14px;
      pointer-events: none;
      transition: 0.3s;
    }

    .inputBoxLogin i {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      background: var(--gold-dim);
      transition: 0.3s;
    }

    .inputBoxLogin input:focus~span,
    .inputBoxLogin input:valid~span {
      top: -6px;
      font-size: 12px;
      color: var(--gold-dim);
    }

    .inputBoxLogin input:focus~i,
    .inputBoxLogin input:valid~i {
      width: 100%;
    }

    .linksLogin {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .linksLogin a {
      color: #aaa;
      font-size: 13px;
      text-decoration: none;
    }

    .linksLogin a:hover {
      color: var(--gold-dim);
    }

    .btnLogin {
      width: 100%;
      padding: 11px;
      background: var(--gold-dim);
      border: none;
      border-radius: 30px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 2rem;
    }

    .btnLogin:hover {
      background: var(--gold-light);
    }

    .passwordBox {
      position: relative;
    }

    .togglePassword {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #777;
      cursor: pointer;
      font-size: 1.8rem;
    }

    .togglePassword:hover,
    .passwordBox input:focus~.togglePassword {
      color: var(--gold-dim);
    }

    .privacy {
      font-size: 1.2rem;
      color: #aaa;
      user-select: none;
    }

    .boxPrivacy {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.4;
    }

    .boxPrivacy input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 2rem;
      height: 2rem;
      border: 2px solid var(--gold-dim);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      margin-top: 2px;
      transition: all 0.2s ease;
    }

    .boxPrivacy input[type="checkbox"]:checked {
      background-color: var(--gold-dim);
    }

    .boxPrivacy input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 1px;
      width: 4px;
      height: 10px;
      border: solid #000;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    @media (max-width: 480px) {
      .boxLogin {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="containerLogin">
    <div class="boxLogin">
      <div class="titleLogin">Đăng Nhập</div>
      <form id="formLogin" autocomplete="off">
        <div class="inputBoxLogin">
          <input type="text" id="username" required>
          <span>Tên tài khoản (VD: 161seconds)</span>
          <i></i>
        </div>

        <div class="inputBoxLogin passwordBox">
          <input type="password" id="password" required>
          <span>Mật khẩu (VD: 123)</span>
          <i></i>
          <button type="button" class="togglePassword">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>

        <div class="linksLogin">
          <a href="#">Quên mật khẩu?</a>
          <a href="./register.html">Chưa có tài khoản?</a>
        </div>

        <label class="boxPrivacy">
          <input id="agree" type="checkbox" checked required />
          <label for="agree" class="privacy">Tôi đồng ý với
            <a href="#" style="color: var(--gold-dim); text-decoration: none;">Điều khoản</a> và
            <a href="#" style="color: var(--gold-dim); text-decoration: none;">Chính sách bảo mật</a>.
          </label>
        </label>

        <button type="submit" class="btnLogin">Đăng Nhập</button>
      </form>
    </div>
  </div>

  <script>
    // Tao hieu ung bui vang
    function createParticles() {
      const container = document.createElement('div');
      container.className = 'bg-particles';
      document.body.appendChild(container);
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = (Math.random() * 5 + 2) + 'px';
        p.style.height = p.style.width;
        p.style.animationDelay = (Math.random() * 8) + 's';
        p.style.animationDuration = (Math.random() * 5 + 6) + 's';
        container.appendChild(p);
      }
    }

    // Khoi tao tai khoan Demo va hieu ung khi load trang
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      let users = JSON.parse(localStorage.getItem('users')) || [];
      if (!users.find(u => u.username === '161seconds')) {
        users.push({ username: '161seconds', password: '123', name: 'Bao (Demo)' });
        localStorage.setItem('users', JSON.stringify(users));
      }
    });

    // An hien mat khau
    const toggleBtn = document.querySelector(".togglePassword");
    toggleBtn.addEventListener("click", function () {
      const input = document.getElementById("password");
      const icon = this.querySelector("i");
      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    });

    // Xu ly submit form
    document.getElementById('formLogin').addEventListener('submit', function (e) {
      e.preventDefault(); // Chan reload trang
      const userVal = document.getElementById('username').value.trim();
      const passVal = document.getElementById('password').value.trim();
      handleLogin(userVal, passVal);
    });

    async function handleLogin(username, password) {
      try {
        const response = await fetch('https://accrue-merit.onrender.com/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.error || "Đăng nhập thất bại!");
          return;
        }

        const user = data.user;
        const stats = user.stats || {};

        localStorage.setItem('currentUser', JSON.stringify(user));

        localStorage.setItem('ducTotal', stats.ducTotal || 0);
        localStorage.setItem('toiTotal', stats.toiTotal || 0);
        localStorage.setItem('moCount', stats.moCount || 0);
        localStorage.setItem('streak', stats.streak || 0);

        alert('Đăng nhập thành công ✦');

        window.location.href = 'index.html';

      } catch (err) {
        console.error("Lỗi kết nối Server:", err);
      }
    }

    function showModal(icon, title, desc, pts = "") {
      document.getElementById('modal-icon').textContent = icon;
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-desc').textContent = desc;
      const ptsEl = document.getElementById('modal-pts');
      if (pts) {
        ptsEl.style.display = 'block';
        ptsEl.textContent = pts;
      } else {
        ptsEl.style.display = 'none';
      }
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  </script>
</body>

</html>
